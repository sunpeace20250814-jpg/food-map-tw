# Netlify config for v2 (純靜態, 無 build step)
# 手動上傳方式: 整個 v2/ 拖到 https://app.netlify.com/drop

[build]
  publish = "."
  # 沒有 build command — v2 是純靜態, 瀏覽器直接吃 HTML+JS+JSON

# SPA fallback: 雖然 v2 不是 SPA, 但保險起見把所有路徑 fallback 到 index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (HTTPS 強制 + 防 XSS)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache static assets 1 year, HTML/JSON 5 min
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Wikimedia images: 允許 CORS (已經 CORS-friendly 但保險)
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"